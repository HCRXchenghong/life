services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: daylink
      MYSQL_USER: daylink
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --binlog-format=ROW
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [internal]

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    pids_limit: 256
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: daylink
      MYSQL_USER: daylink
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      AUTH_SECRET_MASTER_KEY: ${AUTH_SECRET_MASTER_KEY:?set AUTH_SECRET_MASTER_KEY}
      AI_SECRET_MASTER_KEY: ${AI_SECRET_MASTER_KEY:?set AI_SECRET_MASTER_KEY}
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:?set ADMIN_SETUP_TOKEN}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
      HTTP_ADDR: :8080
      ASSET_DIRECTORY: /var/lib/daylink/assets
      AI_UPSTREAM_TIMEOUT: ${AI_UPSTREAM_TIMEOUT:-300s}
      AUTO_MIGRATE: "true"
      TRUSTED_PROXY_CIDRS: 172.16.0.0/12
    volumes:
      - generated-assets:/var/lib/daylink/assets
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/daylink-api", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    pids_limit: 256
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_started
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  mysql-data:
  generated-assets:
  caddy-data:
  caddy-config:
