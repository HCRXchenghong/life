openapi: 3.1.0
info:
  title: Daylink Go API
  version: 0.4.0
  description: >-
    HTTP contract for the Daylink mobile client, public time polls, AI gateway,
    and Web administration. Administrative routes use an HttpOnly administrator
    session established with password plus TOTP. Mobile operator routes use a
    short-lived App bearer token and never receive provider API keys. The API is
    implemented by the standalone Go service with MySQL persistence.
servers:
  - url: https://{daylinkHost}/api
    variables:
      daylinkHost:
        default: daylink.example.com
security:
  - appAccessToken: []
paths:
  /admin/bootstrap:
    get:
      security: []
      operationId: getAdministratorBootstrapState
      description: Returns only the state required to render first setup, enrollment, login, or the authenticated console.
      responses:
        "200":
          description: Current administrator bootstrap state.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [state]
                properties:
                  state: { enum: [uninitialized, pending, enrollment, login, authenticated] }
                  username: { type: string }
  /auth/setup:
    post:
      security: []
      operationId: startAdminEnrollment
      description: Creates the only pending administrator. The account remains unusable until TOTP verification succeeds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [username, password, confirmPassword]
              properties:
                username: { type: string, pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{3,31}$" }
                password: { type: string, minLength: 12, maxLength: 128, format: password }
                confirmPassword: { type: string, minLength: 12, maxLength: 128, format: password }
                setupToken: { type: string, minLength: 24, maxLength: 256, format: password, writeOnly: true }
      responses:
        "201":
          description: Pending administrator created and enrollment cookie set.
          headers:
            Set-Cookie: { schema: { type: string } }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
    delete:
      security:
        - enrollmentCookie: []
      operationId: cancelAdminEnrollment
      description: Cancels only the pending administrator bound to the current enrollment cookie.
      responses:
        "200":
          description: Pending enrollment deleted and enrollment cookie cleared.
          headers:
            Set-Cookie: { schema: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/setup/enrollment:
    get:
      security:
        - enrollmentCookie: []
      operationId: getAdminTotpEnrollment
      responses:
        "200":
          description: One-time TOTP enrollment material. Responses are never cached.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [username, secret, uri, expiresAt]
                properties:
                  username: { type: string }
                  secret: { type: string, pattern: "^[A-Z2-7]+$" }
                  uri: { type: string, pattern: "^otpauth://" }
                  expiresAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/setup/verify:
    post:
      security:
        - enrollmentCookie: []
      operationId: verifyAdminTotpEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [code]
              properties:
                code: { type: string, pattern: "^[0-9]{6}$" }
      responses:
        "200":
          description: Administrator activated and session cookie set.
          headers:
            Set-Cookie: { schema: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
  /auth/login:
    post:
      security: []
      operationId: loginAdministrator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [username, password, code]
              properties:
                username: { type: string }
                password: { type: string, format: password }
                code: { type: string, pattern: "^[0-9]{6}$" }
      responses:
        "200":
          description: Administrator session created.
          headers:
            Set-Cookie: { schema: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      security:
        - adminSession: []
      operationId: logoutAdministrator
      responses:
        "200": { description: Current administrator session revoked. }
  /admin/security/password:
    post:
      security:
        - adminSession: []
      operationId: changeAdministratorPassword
      description: >-
        Changes the administrator password only after password-plus-TOTP step-up.
        The accepted TOTP counter cannot be replayed, and every administrator
        session is revoked after success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [currentPassword, currentCode, newPassword, confirmPassword]
              properties:
                currentPassword: { type: string, maxLength: 128, format: password }
                currentCode: { type: string, pattern: "^[0-9]{6}$" }
                newPassword: { type: string, minLength: 12, maxLength: 128, format: password }
                confirmPassword: { type: string, minLength: 12, maxLength: 128, format: password }
      responses:
        "200":
          description: Password changed, all sessions revoked, and the session cookie cleared.
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [reauthenticate]
                properties:
                  reauthenticate: { const: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/security/totp:
    post:
      security:
        - adminSession: []
      operationId: rebindAdministratorTotp
      description: >-
        Starts or verifies a short-lived Microsoft Authenticator-compatible TOTP
        rebind. Starting requires password-plus-current-TOTP step-up. The old
        factor remains active until the new factor is verified. Verification
        revokes every administrator session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  required: [action, currentPassword, currentCode]
                  properties:
                    action: { const: start }
                    currentPassword: { type: string, maxLength: 128, format: password }
                    currentCode: { type: string, pattern: "^[0-9]{6}$" }
                - type: object
                  additionalProperties: false
                  required: [action, code]
                  properties:
                    action: { const: verify }
                    code: { type: string, pattern: "^[0-9]{6}$" }
      responses:
        "200":
          description: >-
            Start returns short-lived enrollment material and sets the rebind
            cookie; verify returns reauthenticate=true and clears both cookies.
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AdminTotpRebindEnrollment"
                  - type: object
                    additionalProperties: false
                    required: [reauthenticate]
                    properties:
                      reauthenticate: { const: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
    delete:
      security:
        - adminSession: []
          adminTotpRebind: []
      operationId: cancelAdministratorTotpRebind
      description: Cancels pending enrollment without changing the currently active TOTP factor.
      responses:
        "200":
          description: Pending rebind removed and its cookie cleared.
          headers:
            Set-Cookie: { schema: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /admin/app-accounts:
    get:
      security:
        - adminSession: []
      operationId: listAppAccounts
      description: Lists login metadata only. Password digests and user content are never returned.
      responses:
        "200":
          description: App accounts visible to the administrator.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [accounts]
                properties:
                  accounts:
                    type: array
                    items: { $ref: "#/components/schemas/AppAccount" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      security:
        - adminSession: []
      operationId: createAppAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [username, password, confirmPassword]
              properties:
                username: { type: string, pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{3,31}$" }
                password: { type: string, minLength: 12, maxLength: 128, format: password }
                confirmPassword: { type: string, minLength: 12, maxLength: 128, format: password }
      responses:
        "201":
          description: App account created with mandatory first-login password change.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [account]
                properties:
                  account: { $ref: "#/components/schemas/AppAccount" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
    patch:
      security:
        - adminSession: []
      operationId: manageAppAccount
      description: Enables, disables, or resets an App account. Disable and password reset revoke all device sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  required: [id, action]
                  properties:
                    id: { type: string, format: uuid }
                    action: { enum: [enable, disable] }
                - type: object
                  additionalProperties: false
                  required: [id, action, password, confirmPassword]
                  properties:
                    id: { type: string, format: uuid }
                    action: { const: reset_password }
                    password: { type: string, minLength: 12, maxLength: 128, format: password }
                    confirmPassword: { type: string, minLength: 12, maxLength: 128, format: password }
      responses:
        "200": { description: App account updated. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /admin/app-subscriptions:
    post:
      security:
        - adminSession: []
      operationId: manageAppAiSubscription
      description: Grants, extends, replaces, or revokes an App AI subscription. This operation is available only to an authenticated administrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  required: [accountId, action, plan, cardType]
                  properties:
                    accountId: { type: string, format: uuid }
                    action: { const: grant }
                    plan: { enum: [plus, pro, max] }
                    cardType: { enum: [week, month, quarter, year] }
                - type: object
                  additionalProperties: false
                  required: [accountId, action]
                  properties:
                    accountId: { type: string, format: uuid }
                    action: { const: revoke }
      responses:
        "200":
          description: Current subscription, or null after revocation.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [subscription]
                properties:
                  subscription:
                    oneOf:
                      - { $ref: "#/components/schemas/AiSubscription" }
                      - { type: "null" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/Error" }
  /admin/ai-plans:
    get:
      security:
        - adminSession: []
      operationId: listAiPlanLimits
      responses:
        "200":
          description: Plus and Pro weekly/monthly limits. Max is always unlimited.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [plans]
                properties:
                  plans:
                    type: array
                    items: { $ref: "#/components/schemas/AiPlanLimit" }
    post:
      security:
        - adminSession: []
      operationId: updateAiPlanLimits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [plus, pro]
              properties:
                plus: { $ref: "#/components/schemas/AiPlanLimitInput" }
                pro: { $ref: "#/components/schemas/AiPlanLimitInput" }
      responses:
        "200": { description: Limits saved. }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /admin/providers:
    get:
      security:
        - adminSession: []
      operationId: listAiProviders
      description: Lists administrator-owned AI provider metadata. API Key ciphertext and plaintext are never returned.
      responses:
        "200":
          description: AI provider metadata safe for the administration UI.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [providers]
                properties:
                  providers:
                    type: array
                    items: { $ref: "#/components/schemas/AiProvider" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      security:
        - adminSession: []
      operationId: saveAiProvider
      description: >-
        Creates or updates an AI provider. The API Key is write-only, encrypted
        before persistence, and may be omitted during an update to retain the existing Key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateAiProviderRequest"
                - $ref: "#/components/schemas/UpdateAiProviderRequest"
      responses:
        "200":
          description: Existing provider updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [provider]
                properties:
                  provider: { $ref: "#/components/schemas/AiProvider" }
        "201":
          description: Provider created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [provider]
                properties:
                  provider: { $ref: "#/components/schemas/AiProvider" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /admin/ai-test:
    post:
      security:
        - adminSession: []
      operationId: testAiProvider
      description: Runs a bounded fixed-prompt connectivity test without returning provider output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [providerId]
              properties:
                providerId: { type: string, format: uuid }
      responses:
        "200":
          description: Provider connection succeeded.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok]
                properties:
                  ok: { const: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
  /app/auth/login:
    post:
      security: []
      operationId: loginAppAccount
      description: Exchanges an App username and password for a short access token and rotating refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [username, password]
              properties:
                username: { type: string, maxLength: 32 }
                password: { type: string, maxLength: 128, format: password }
                deviceName: { type: string, maxLength: 80 }
      responses:
        "200": { $ref: "#/components/responses/AppAuthenticated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
  /app/auth/refresh:
    post:
      security: []
      operationId: refreshAppSession
      description: Rotates both App tokens. A refresh token can succeed only once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [refreshToken]
              properties:
                refreshToken: { type: string, minLength: 32, maxLength: 256, format: password }
      responses:
        "200":
          description: A new token pair.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [tokens]
                properties:
                  tokens: { $ref: "#/components/schemas/AppTokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
  /app/auth/session:
    get:
      security:
        - appAccessToken: []
      operationId: getAppSession
      responses:
        "200":
          description: Current App identity metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [account]
                properties:
                  account: { $ref: "#/components/schemas/AppIdentity" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      security:
        - appAccessToken: []
      operationId: logoutAppSession
      responses:
        "200": { description: Current App session revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /app/auth/password:
    post:
      security:
        - appAccessToken: []
      operationId: changeAppPassword
      description: Changes the App password, revokes every old device session, and returns a fresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, maxLength: 128, format: password }
                newPassword: { type: string, minLength: 12, maxLength: 128, format: password }
      responses:
        "200": { $ref: "#/components/responses/AppAuthenticated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/Error" }
  /app/ai-entitlement:
    get:
      security:
        - appAccessToken: []
      operationId: getAppAiEntitlement
      responses:
        "200":
          description: Subscription state and account-level usage shared by local AI and SSH Agent modes.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [entitlement]
                properties:
                  entitlement: { $ref: "#/components/schemas/AiEntitlement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /app/ai-remote-token:
    post:
      security:
        - appAccessToken: []
      operationId: createRemoteAgentAiCredential
      description: Creates a short-lived account-scoped Codex gateway token. The upstream provider key is never returned.
      responses:
        "201":
          description: Short-lived credential bounded by subscription expiry.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [gateway]
                properties:
                  gateway:
                    type: object
                    additionalProperties: false
                    required: [baseUrl, token, model, expiresAt]
                    properties:
                      baseUrl: { type: string, format: uri, pattern: "^https://" }
                      token: { type: string, pattern: "^dlkc_", writeOnly: true }
                      model: { type: string }
                      expiresAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/Error" }
  /health:
    get:
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status, service, version, time]
                properties:
                  status: { const: ok }
                  service: { const: daylink-api }
                  version: { type: string }
                  time: { type: string, format: date-time }
  /assistant/responses:
    post:
      operationId: createAssistantResponse
      description: >-
        Sends a Responses-compatible turn through a server-managed provider.
        Only strict function tools are accepted; tool execution stays on-device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRequest"
      responses:
        "200":
          description: Provider Responses payload, including function_call items.
          content:
            application/json:
              schema: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
  /assistant/images:
    post:
      operationId: generateAssistantImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [providerId, prompt]
              properties:
                providerId: { type: string, maxLength: 64 }
                prompt: { type: string, minLength: 1, maxLength: 8000 }
                n: { type: integer, enum: [1], default: 1 }
                size:
                  enum: [1024x1024, 1536x1024, 1024x1536]
                  default: 1024x1024
                quality:
                  enum: [low, medium, high]
                  default: medium
                output_format: { enum: [png], default: png }
      responses:
        "200":
          description: OpenAI Images-compatible base64 response.
          content:
            application/json:
              schema:
                type: object
                required: [created, data]
                properties:
                  created: { type: integer }
                  data:
                    type: array
                    minItems: 1
                    maxItems: 1
                    items:
                      type: object
                      required: [b64_json]
                      properties:
                        b64_json: { type: string, contentEncoding: base64 }
                        revised_prompt: { type: [string, "null"] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
  /polls:
    get:
      operationId: listPolls
      responses:
        "200":
          description: Poll metadata owned by the current App account.
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createPoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollRequest"
      responses:
        "201":
          description: Poll and one-time management token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [poll]
                properties:
                  poll:
                    type: object
                    additionalProperties: false
                    required: [id, publicToken, manageToken, inviteUrl, status, version]
                    properties:
                      id: { type: string, format: uuid }
                      publicToken: { type: string }
                      manageToken: { type: string }
                      inviteUrl: { type: string, format: uri }
                      status: { const: open }
                      version: { const: 1 }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /polls/{publicToken}:
    parameters:
      - $ref: "#/components/parameters/PublicToken"
    get:
      security: []
      operationId: getPoll
      responses:
        "200":
          description: Public poll state and aggregated choices.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PollState" }
        "404": { $ref: "#/components/responses/Error" }
  /polls/{publicToken}/votes:
    parameters:
      - $ref: "#/components/parameters/PublicToken"
    post:
      security: []
      operationId: upsertPollVotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [displayName, votes]
              properties:
                displayName: { type: string, minLength: 1, maxLength: 80 }
                editToken: { type: string }
                votes:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    additionalProperties: false
                    required: [slotId, response]
                    properties:
                      slotId: { type: string, format: uuid }
                      response: { type: string, enum: ["yes", "maybe", "no"] }
      responses:
        "200":
          description: Existing participant votes updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteReceipt" }
        "201":
          description: Participant and votes created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteReceipt" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /polls/{publicToken}/finalize:
    parameters:
      - $ref: "#/components/parameters/PublicToken"
    post:
      security: []
      operationId: finalizePoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [manageToken, slotId, expectedVersion]
              properties:
                manageToken: { type: string }
                slotId: { type: string, format: uuid }
                expectedVersion: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Poll finalized with the selected time.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [pollId, version, selectedSlot]
                properties:
                  pollId: { type: string, format: uuid }
                  version: { type: integer, minimum: 2 }
                  selectedSlot: { $ref: "#/components/schemas/PollSlot" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /sync/changes:
    get:
      operationId: getEncryptedSyncChanges
      description: Returns the account-scoped append-only encrypted change log after a monotonic cursor.
      parameters:
        - name: cursor
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "200":
          description: Encrypted changes. The server never receives plaintext or the content master key.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [changes, cursor, hasMore]
                properties:
                  changes:
                    type: array
                    items: { $ref: "#/components/schemas/SyncChange" }
                  cursor: { type: integer, minimum: 0 }
                  hasMore: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /sync/objects/{collection}/{objectId}:
    parameters:
      - name: collection
        in: path
        required: true
        schema: { type: string, pattern: "^[a-z][a-z0-9_]{1,63}$" }
      - name: objectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: putEncryptedSyncObject
      description: Idempotent optimistic write of a client-encrypted object.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SyncMutation" }
      responses:
        "200": { description: Revision accepted or the identical operation replayed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteEncryptedSyncObject
      description: Writes an encrypted-account tombstone. All query parameters are required.
      parameters:
        - { name: expectedRevision, in: query, required: true, schema: { type: integer, minimum: 1 } }
        - { name: operationId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: deviceId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Tombstone accepted or replayed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Error" }
  /sync/events:
    get:
      operationId: streamEncryptedSyncEvents
      description: Account-scoped SSE wake-up stream. Clients always reconcile using /sync/changes after reconnecting. A session_revoked event requires immediate local credential deletion and return to login.
      responses:
        "200":
          description: text/event-stream with ready, changes, session_revoked, and keepalive events. session_revoked data contains only an allowlisted reason.
          content:
            text/event-stream: {}
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/responses:
    servers:
      - url: https://{daylinkHost}
        variables:
          daylinkHost:
            default: daylink.example.com
    post:
      security:
        - aiGatewayToken: []
      operationId: proxyRemoteCodexResponse
      description: OpenAI Responses-compatible proxy for Codex running on an App user's SSH host. Requests are billed to that App account.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: JSON or SSE Responses payload. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
  /v1/models:
    servers:
      - url: https://{daylinkHost}
        variables:
          daylinkHost:
            default: daylink.example.com
    get:
      security:
        - aiGatewayToken: []
      operationId: listRemoteCodexModels
      responses:
        "200": { description: Models exposed by the configured Daylink AI provider. }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/images/generations:
    servers:
      - url: https://{daylinkHost}
        variables:
          daylinkHost:
            default: daylink.example.com
    post:
      security:
        - aiGatewayToken: []
      operationId: proxyRemoteCodexImage
      description: OpenAI Images-compatible proxy billed at five account units per successful request.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OpenAI Images-compatible payload. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: daylink_admin_session
    enrollmentCookie:
      type: apiKey
      in: cookie
      name: daylink_admin_enrollment
    adminTotpRebind:
      type: apiKey
      in: cookie
      name: daylink_admin_totp_rebind
    appAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Daylink-App-Access
    aiGatewayToken:
      type: http
      scheme: bearer
      bearerFormat: Daylink-Remote-Agent
  parameters:
    PublicToken:
      name: publicToken
      in: path
      required: true
      schema: { type: string, minLength: 20, maxLength: 200 }
  responses:
    AppAuthenticated:
      description: App identity and a newly issued token pair. Tokens must be stored in platform secure storage.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [account, tokens]
            properties:
              account: { $ref: "#/components/schemas/AppIdentity" }
              tokens: { $ref: "#/components/schemas/AppTokenPair" }
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Error:
      description: Request could not be completed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    AdminTotpRebindEnrollment:
      type: object
      additionalProperties: false
      required: [username, secret, uri, expiresAt]
      properties:
        username: { type: string }
        secret: { type: string, pattern: "^[A-Z2-7]+$", writeOnly: true }
        uri: { type: string, pattern: "^otpauth://", writeOnly: true }
        expiresAt: { type: string, format: date-time }
    AiProvider:
      type: object
      additionalProperties: false
      required: [id, name, kind, baseUrl, textModel, imageModel, apiKeyHint, enabled, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 80 }
        kind: { enum: [openai_responses, openai_compatible] }
        baseUrl: { type: string, format: uri, pattern: "^https://" }
        textModel: { type: string, minLength: 1, maxLength: 120 }
        imageModel: { type: [string, "null"], maxLength: 120 }
        apiKeyHint: { type: string }
        enabled: { type: boolean }
        updatedAt: { type: string, format: date-time }
    CreateAiProviderRequest:
      type: object
      additionalProperties: false
      required: [name, kind, baseUrl, textModel, apiKey]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        kind: { enum: [openai_responses, openai_compatible] }
        baseUrl: { type: string, format: uri, pattern: "^https://" }
        textModel: { type: string, minLength: 1, maxLength: 120 }
        imageModel: { type: string, maxLength: 120 }
        apiKey: { type: string, minLength: 1, maxLength: 4096, format: password, writeOnly: true }
        enabled: { type: boolean, default: true }
    UpdateAiProviderRequest:
      type: object
      additionalProperties: false
      required: [id, name, kind, baseUrl, textModel]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 80 }
        kind: { enum: [openai_responses, openai_compatible] }
        baseUrl: { type: string, format: uri, pattern: "^https://" }
        textModel: { type: string, minLength: 1, maxLength: 120 }
        imageModel: { type: string, maxLength: 120 }
        apiKey: { type: string, maxLength: 4096, format: password, writeOnly: true }
        enabled: { type: boolean, default: true }
    AppIdentity:
      type: object
      additionalProperties: false
      required: [id, username, passwordChangeRequired]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        passwordChangeRequired: { type: boolean }
    AppAccount:
      type: object
      additionalProperties: false
      required: [id, username, passwordChangeRequired, status, lockedUntil, lastLoginAt, createdAt, subscription]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        passwordChangeRequired: { type: boolean }
        status: { enum: [active, disabled] }
        lockedUntil: { type: [string, "null"], format: date-time }
        lastLoginAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        subscription:
          oneOf:
            - { $ref: "#/components/schemas/AiSubscription" }
            - { type: "null" }
    AiSubscription:
      type: object
      additionalProperties: false
      required: [plan, cardType, startsAt, expiresAt, active]
      properties:
        plan: { enum: [plus, pro, max] }
        cardType: { enum: [week, month, quarter, year] }
        startsAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        active: { type: boolean }
    AiPlanLimitInput:
      type: object
      additionalProperties: false
      required: [weeklyUnits, monthlyUnits]
      properties:
        weeklyUnits: { type: integer, minimum: 0, maximum: 10000000 }
        monthlyUnits: { type: integer, minimum: 0, maximum: 10000000 }
    AiPlanLimit:
      allOf:
        - $ref: "#/components/schemas/AiPlanLimitInput"
        - type: object
          required: [plan, updatedAt]
          properties:
            plan: { enum: [plus, pro] }
            updatedAt: { type: string, format: date-time }
    AiEntitlement:
      type: object
      additionalProperties: false
      required: [active, weeklyUsed, weeklyLimit, weeklyResetsAt, monthlyUsed, monthlyLimit, monthlyResetsAt, supportedModes]
      properties:
        active: { type: boolean }
        plan: { enum: [plus, pro, max] }
        cardType: { enum: [week, month, quarter, year] }
        startsAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        weeklyUsed: { type: integer, minimum: 0 }
        weeklyLimit: { type: [integer, "null"], minimum: 0 }
        weeklyResetsAt: { type: string, format: date-time }
        monthlyUsed: { type: integer, minimum: 0 }
        monthlyLimit: { type: [integer, "null"], minimum: 0 }
        monthlyResetsAt: { type: string, format: date-time }
        supportedModes:
          type: array
          items: { enum: [local_ai, ssh_agent] }
    AppTokenPair:
      type: object
      additionalProperties: false
      required: [accessToken, accessExpiresAt, refreshToken, refreshExpiresAt]
      properties:
        accessToken: { type: string, minLength: 32, maxLength: 256 }
        accessExpiresAt: { type: string, format: date-time }
        refreshToken: { type: string, minLength: 32, maxLength: 256 }
        refreshExpiresAt: { type: string, format: date-time }
    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
    AssistantRequest:
      type: object
      additionalProperties: false
      required: [providerId, input, tools]
      properties:
        providerId: { type: string, maxLength: 64 }
        input:
          oneOf:
            - { type: string, maxLength: 128000 }
            - { type: array, maxItems: 64 }
        previous_response_id: { type: string, maxLength: 200 }
        store: { type: boolean }
        parallel_tool_calls: { const: false }
        tools:
          type: array
          maxItems: 64
          items:
            type: object
            additionalProperties: false
            required: [type, name, description, strict, parameters]
            properties:
              type: { const: function }
              name: { type: string, pattern: "^[A-Za-z0-9_-]{1,64}$" }
              description: { type: string, minLength: 1, maxLength: 1000 }
              strict: { const: true }
              parameters: { type: object }
    CreatePollRequest:
      type: object
      additionalProperties: false
      required: [title, timezone, slots]
      properties:
        title: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 2000 }
        timezone: { type: string, minLength: 1, maxLength: 80 }
        closesAt: { type: [string, "null"], format: date-time }
        slots:
          type: array
          minItems: 2
          maxItems: 30
          items:
            type: object
            additionalProperties: false
            required: [startsAt, endsAt]
            properties:
              label: { type: string, maxLength: 120 }
              startsAt: { type: string, format: date-time }
              endsAt: { type: string, format: date-time }
    Poll:
      type: object
      additionalProperties: true
      required: [id, title, timezone, status, version]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        timezone: { type: string }
        status: { enum: [open, closed, cancelled, expired] }
        version: { type: integer }
        selectedSlotId: { type: [string, "null"] }
    PollSlot:
      type: object
      additionalProperties: true
      required: [id, startsAt, endsAt]
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
    PollState:
      type: object
      additionalProperties: false
      required: [poll, slots, participants, votes]
      properties:
        poll: { $ref: "#/components/schemas/Poll" }
        slots:
          type: array
          items: { $ref: "#/components/schemas/PollSlot" }
        participants:
          type: array
          items:
            type: object
            required: [id, displayName]
            properties:
              id: { type: string, format: uuid }
              displayName: { type: string }
        votes:
          type: array
          items:
            type: object
            required: [participantId, slotId, response]
            properties:
              participantId: { type: string, format: uuid }
              slotId: { type: string, format: uuid }
              response: { type: string, enum: ["yes", "maybe", "no"] }
    VoteReceipt:
      type: object
      additionalProperties: false
      required: [participant, editToken, version]
      properties:
        participant:
          type: object
          additionalProperties: false
          required: [id, displayName]
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
        editToken: { type: string }
        version: { type: integer, minimum: 1 }
    SyncMutation:
      type: object
      additionalProperties: false
      required: [operationId, deviceId, expectedRevision, revision, ciphertext, nonce, keyVersion, clientUpdatedAt]
      properties:
        operationId: { type: string, format: uuid }
        deviceId: { type: string, format: uuid }
        expectedRevision: { type: integer, minimum: 0 }
        revision: { type: integer, minimum: 1 }
        ciphertext: { type: string, contentEncoding: base64, maxLength: 2796204 }
        nonce: { type: string, contentEncoding: base64 }
        keyVersion: { type: integer, minimum: 1, maximum: 1000000 }
        clientUpdatedAt: { type: string, format: date-time }
    SyncChange:
      type: object
      additionalProperties: false
      required: [cursor, collection, id, operationId, deviceId, revision, deleted, clientUpdatedAt, serverUpdatedAt]
      properties:
        cursor: { type: integer, minimum: 1 }
        collection: { type: string }
        id: { type: string, format: uuid }
        operationId: { type: string, format: uuid }
        deviceId: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
        deleted: { type: boolean }
        ciphertext: { type: string, contentEncoding: base64 }
        nonce: { type: string, contentEncoding: base64 }
        keyVersion: { type: integer, minimum: 1 }
        clientUpdatedAt: { type: string, format: date-time }
        serverUpdatedAt: { type: string, format: date-time }
